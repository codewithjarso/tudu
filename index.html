<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowDo</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">

  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <h1>FlowDo</h1>
      <p class="subtitle">Productivity To-Do App</p>
    </header>

    <!-- ADD TASK -->
    <div class="command-bar">
      <input id="taskInput" type="text" placeholder="Add a task..." />
      <button id="addTaskBtn">Add</button>
    </div>

    <!-- TASK LIST -->
    <ul id="taskList" class="task-list"></ul>

  </div>
</div>

<!-- DRAWER -->
<div id="overlay" class="overlay hidden"></div>

<aside id="taskDrawer" class="task-drawer hidden">

  <div class="drawer-header">
    <span id="taskStatus">In Progress</span>
    <div>
      <button id="deleteTaskBtn">🗑</button>
      <button id="closeDrawerBtn">✕</button>
    </div>
  </div>

  <div class="drawer-content">

    <h2 id="taskTitle"></h2>
    <p id="taskDesc"></p>

    <!-- PRIORITY -->
    <div id="priorityGroup"></div>

    <!-- SUBTASKS -->
    <h3>Subtasks</h3>
    <div id="subtaskList"></div>

    <input id="subtaskInput" placeholder="Add subtask..." />
    <button id="addSubtaskBtn">+</button>

    <!-- COMMENTS -->
    <h3>Comments</h3>
    <div id="commentList"></div>

    <input id="commentInput" placeholder="Add comment..." />
    <button id="addCommentBtn">+</button>

  </div>

</aside>

<script src="js/models.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
